{% extends "base.html" %}
{% block content %}
<div class="container py-5 d-flex justify-content-center">
  <div class="card shadow-sm w-100" style="max-width:420px;border-radius:16px">
    <div class="card-body p-4">
      <h4 class="fw-bold text-center mb-4"><i class="bi bi-person-plus text-success"></i> Register</h4>
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Your name" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control" placeholder="your@email.com" required/>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Password" required/>
        </div>
        <button type="submit" class="btn btn-success w-100 fw-bold">Create Account</button>
      </form>
      <p class="text-center mt-3 mb-0 text-muted">
        Already have an account? <a href="/login">Sign In</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
